name: Checkmarx scan (manual)

# Manual, on-demand Checkmarx scan of this repo with all five engines, run inside
# the batteries-included cx-onprem-orchestrator fat image. Engines run in PARALLEL
# and the outcome is synced into a single run-summary.json. Triggered only via the
# Actions "Run workflow" button.
on:
  workflow_dispatch:
    inputs:
      scanners:
        description: "Engines to run (the cx --scan-types analog; only these run)"
        default: "sast,sca,kics,secrets,containers"
        required: true
      threshold:
        description: "cx-style gate; blank = report-only (secrets still fails on any secret)"
        default: "sast-critical=1;sca-critical=1;iac-security-high=1;secrets-total=1;containers-critical=1"
        required: false
      sast_team:
        description: "CxSAST team/full path for the project (CxSAST requires it)"
        default: "CxServer/SP"
        required: true
      runner:
        description: "Runner label (ubuntu-latest reaches the public CxSAST + Cx1)"
        default: "ubuntu-latest"
        required: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ${{ inputs.runner }}
    container:
      image: ghcr.io/cx-michael-pogrebisky/cx-onprem-orchestrator:fat
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Provision project build tools (SCA dependency resolution)
        # SCA Resolver resolves THIS repo's dependencies LOCALLY, so the build
        # environment must carry the project's language toolchains. The fat image
        # intentionally bundles none (they vary per project) — install the ones
        # this repo needs here. Runs as root inside the debian-based fat image.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends nodejs npm python3 python3-pip
          node --version && npm --version && python3 --version

      - name: Checkmarx scan — all engines in parallel via the fat image
        id: scan
        continue-on-error: true        # always reach the summary/upload; the verdict is in run-summary.json
        env:
          CX1_APIKEY:      ${{ secrets.CX1_APIKEY }}      # Cx1 (SCA + Container Security)
          CXSAST_URL:      ${{ secrets.CXSAST_URL }}      # CxSAST -> -CxServer
          CXSAST_USERNAME: ${{ secrets.CXSAST_USERNAME }} # CxSAST -> -CxUser
          CXSAST_PASSWORD: ${{ secrets.CXSAST_PASSWORD }} # CxSAST -> -CxPassword
        run: |
          cx-onprem-orchestrator run \
            --scanners "${{ inputs.scanners }}" \
            --parallel 8 \
            --sast-team "${{ inputs.sast_team }}" \
            --threshold "${{ inputs.threshold }}" \
            --report-formats json,sarif \
            --output-path reports
          # Note: SCA and Container Security target the same Cx1 project here, so
          # the orchestrator serializes them automatically (containers first, then
          # sca) to avoid the backend failing one when both start together.

      - name: Summary
        if: always()
        run: |
          echo "::group::run-summary.json"
          cat reports/run-summary.json 2>/dev/null || echo "(no summary written)"
          echo "::endgroup::"
          echo "scan step outcome: ${{ steps.scan.outcome }}"

      - name: Upload Checkmarx reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: checkmarx-reports
          path: reports/
          if-no-files-found: warn
